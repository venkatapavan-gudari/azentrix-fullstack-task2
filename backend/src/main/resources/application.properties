# Server Port
server.port=8080

# Context Path (Optional, but let's keep base clean)
server.servlet.context-path=

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/trello_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:klu123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
app.jwt.secret=${JWT_SECRET:9a2f9828781e62688bfa17dfd1012a95c3285627abcb2b3c20202d131f456721}
app.jwt.expiration-milliseconds=${JWT_EXPIRATION:604800000}

# Logging configuration (Optional)
logging.level.org.springframework.security=INFO
logging.level.com.trello=DEBUG
